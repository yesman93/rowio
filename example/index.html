<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">

        <title>Rowio demo page</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="../rowio.js" type="text/javascript"></script>

        <script type="text/javascript">

            document.addEventListener('DOMContentLoaded', function(){

                Rowio.init();

            });

        </script>

    </head>
    <body>


        <div class="rowio" data-rowio-prefix="enum_">
            <template class="rowio-template">
                <div class="row gx-2 rowio-row">
                    <div class="col-5">
                        <div class="form-group mb-3">
                            <input name="enum_value" type="text" id="enum_value" class="form-control " value="" data-show-search="0" placeholder="Value">
                        </div>
                    </div>
                    <div class="col-5">
                        <div class="form-group mb-3">
                            <input name="enum_label" type="text" id="enum_label" class="form-control " value="" data-show-search="0" placeholder="Label">
                        </div>
                    </div>
                    <div class="col-2">
                        <a href="javascript:;" class="btn btn-danger rowio-remove">x</a>
                    </div>
                </div>
            </template>
            <a href="javascript:;" class="btn btn-primary rowio-add">+</a>
        </div>




    </body>
</html>
